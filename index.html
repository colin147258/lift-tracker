<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: #0d0d0f; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif; overflow: hidden; }
  #app { position: fixed; inset: 0; display: flex; flex-direction: column; background: #0d0d0f; }
  input, select, button, textarea { font-family: inherit; }
  input:focus, select:focus, textarea:focus { outline: none; }
  button { -webkit-appearance: none; }
  select { -webkit-appearance: none; appearance: none; }
  ::-webkit-scrollbar { display: none; }
  
  .screen { 
    position: absolute; inset: 0; 
    overflow-y: auto; overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    padding-top: env(safe-area-inset-top, 20px);
    padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 72px);
  }
  
  .tab-bar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
    display: flex;
    background: rgba(13,13,15,0.92);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid rgba(255,255,255,0.09);
    padding-bottom: env(safe-area-inset-bottom, 0px);
  }
  .tab-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 3px; padding: 8px 2px 10px; background: none; border: none; cursor: pointer;
    position: relative; min-height: 56px; color: #333;
    transition: color 0.15s;
  }
  .tab-btn.active { color: #fff; }
  .tab-btn svg { display: block; }
  .tab-label { font-size: 9px; font-weight: 600; letter-spacing: 0.03em; text-transform: uppercase; }
  .tab-dot { position: absolute; top: 7px; right: calc(50% - 14px); width: 7px; height: 7px; border-radius: 50%; }
  
  .page-header {
    padding: 20px 16px 0;
  }
  
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 20px; }
  .stat-card { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 12px 8px; text-align: center; }
  .stat-val { font-size: 22px; font-weight: 800; color: #fff; font-variant-numeric: tabular-nums; }
  .stat-lbl { font-size: 9px; color: #555; text-transform: uppercase; letter-spacing: 0.07em; margin-top: 2px; }
  
  .muscle-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 24px; }
  .muscle-card {
    border-radius: 16px; padding: 14px 12px; text-align: left; cursor: pointer;
    border: 1.5px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.04);
    position: relative; min-height: 84px; width: 100%;
    transition: transform 0.1s;
  }
  .muscle-card:active { transform: scale(0.97); }
  
  .session-card {
    background: rgba(255,255,255,0.03); border-radius: 14px; margin-bottom: 8px;
    overflow: hidden; border: 1px solid rgba(255,255,255,0.07);
  }
  .session-header {
    width: 100%; background: none; border: none; padding: 14px 16px;
    cursor: pointer; display: flex; align-items: center; gap: 10; min-height: 56px;
    text-align: left;
  }
  .session-body { padding: 0 16px 14px; border-top: 1px solid rgba(255,255,255,0.06); }
  
  .chip {
    display: inline-block; border-radius: 20px; padding: 3px 10px;
    font-size: 11px; font-weight: 600; white-space: nowrap;
    background: rgba(255,255,255,0.08); color: #888;
  }
  
  .form-label { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; display: block; }
  .form-input {
    background: rgba(255,255,255,0.07); border: 1.5px solid rgba(255,255,255,0.12);
    border-radius: 12px; padding: 14px; color: #fff; font-size: 15px; font-family: inherit;
    width: 100%; color-scheme: dark;
  }
  .form-input:focus { border-color: rgba(255,255,255,0.25); }
  .form-input::placeholder { color: #444; }
  
  .set-input {
    background: rgba(255,255,255,0.07); border: 1.5px solid rgba(255,255,255,0.12);
    border-radius: 12px; padding: 12px 8px; color: #fff; font-size: 14px; font-family: inherit;
    width: 100%; text-align: center; color-scheme: dark;
  }
  .set-input:focus { border-color: rgba(255,255,255,0.25); }
  .set-input::placeholder { color: #444; }
  
  .ex-card {
    background: rgba(255,255,255,0.04); border-radius: 16px; padding: 14px;
    margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.08);
  }
  
  .btn-primary {
    width: 100%; border: none; border-radius: 14px; padding: 17px;
    font-size: 16px; font-weight: 700; color: #fff; cursor: pointer; font-family: inherit;
    transition: transform 0.1s, opacity 0.1s;
  }
  .btn-primary:active { transform: scale(0.98); opacity: 0.85; }
  
  .btn-ghost {
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
    color: #888; border-radius: 12px; padding: 13px; font-size: 13px; 
    cursor: pointer; font-weight: 600; font-family: inherit; width: 100%;
    transition: background 0.15s;
  }
  .btn-ghost:active { background: rgba(255,255,255,0.1); }
  
  .btn-danger {
    background: rgba(231,76,60,0.12); border: 1px solid rgba(231,76,60,0.3);
    color: #e74c3c; border-radius: 10px; padding: 10px 14px; font-size: 12px;
    cursor: pointer; font-weight: 600; font-family: inherit;
  }
  
  .btn-add-ex {
    width: 100%; background: transparent; border-radius: 16px;
    padding: 14px; font-size: 14px; cursor: pointer; font-weight: 600;
    font-family: inherit; border: 2px dashed;
    transition: opacity 0.15s;
  }
  .btn-add-ex:active { opacity: 0.7; }
  
  .btn-add-set {
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
    color: #888; border-radius: 10px; padding: 10px; font-size: 13px;
    cursor: pointer; width: 100%; margin-top: 4px; font-family: inherit;
  }
  
  .log-footer {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: 12px 16px; padding-bottom: calc(env(safe-area-inset-bottom,0px) + 12px);
    background: rgba(13,13,15,0.95);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid rgba(255,255,255,0.07); z-index: 40;
  }
  
  .muscle-fab {
    position: fixed; left: 16px; right: 16px; z-index: 40;
    bottom: calc(env(safe-area-inset-bottom,0px) + 70px);
  }
  
  .overdue-banner {
    border-radius: 12px; padding: 10px 14px; margin: 12px 0;
    font-size: 12px; border: 1px solid;
  }
  
  .freq-bar-wrap {
    display: flex; align-items: flex-end; gap: 2px; height: 32px;
    overflow-x: auto; margin-top: 6px; padding-bottom: 2px;
  }
  .freq-bar { min-width: 6px; width: 6px; border-radius: 2px; flex-shrink: 0; }
  
  .toast {
    position: fixed; top: calc(env(safe-area-inset-top,20px) + 12px);
    left: 50%; transform: translateX(-50%);
    background: rgba(30,30,40,0.96); border: 1px solid rgba(255,255,255,0.1);
    color: #fff; border-radius: 20px; padding: 10px 20px;
    font-size: 13px; font-weight: 600; z-index: 100; white-space: nowrap;
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform: translateX(-50%) translateY(-8px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }
  
  .slide-up { animation: slideUp 0.28s cubic-bezier(0.32,0.72,0,1); }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  
  .recent-row {
    display: flex; align-items: center; gap: 10; padding: 13px 0;
    border-bottom: 1px solid rgba(255,255,255,0.06); cursor: pointer;
  }
  
  .section-label { font-size: 10px; color: #444; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; }
  
  .hidden { display: none !important; }
  
  .partner-chips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
  
  .ex-select {
    flex: 1; background: rgba(255,255,255,0.07); border: 1.5px solid rgba(255,255,255,0.12);
    border-radius: 12px; padding: 14px; color: #555; font-size: 15px; font-family: inherit;
    color-scheme: dark; cursor: pointer;
  }
  .ex-select.has-value { color: #fff; }
  .ex-select:focus { border-color: rgba(255,255,255,0.25); }

  option { background: #1a1a22; color: #fff; }

  /* Set tag badge */
  .set-tag {
    border-radius: 8px; padding: 0 8px; font-size: 11px; font-weight: 700;
    cursor: pointer; border: 1.5px solid; flex-shrink: 0;
    height: 42px; display: flex; align-items: center; white-space: nowrap;
    font-family: inherit; background: none;
  }
  .set-tag.none { border-color: rgba(255,255,255,0.1); color: #383838; }
  .set-tag.drop { background: rgba(233,69,96,0.15); border-color: rgba(233,69,96,0.5); color: #ff8fa3; }
  .set-tag.half { background: rgba(255,149,0,0.15); border-color: rgba(255,149,0,0.5); color: #ffb84d; }
  .set-tag.both { background: rgba(175,82,222,0.15); border-color: rgba(175,82,222,0.5); color: #cc88ef; }

  /* Copy-down button */
  .btn-copy-down {
    background: rgba(255,255,255,0.05); border: 1.5px solid rgba(255,255,255,0.1);
    color: #555; border-radius: 8px; cursor: pointer; font-family: inherit;
    flex-shrink: 0; height: 42px; width: 38px; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
  }
  .btn-copy-down:active { background: rgba(255,255,255,0.14); color: #bbb; }

  /* Drop set connector — wraps a tagged set row */
  .set-connector-wrap { position: relative; padding-left: 14px; margin-bottom: 8px; }
  .set-connector-wrap::before {
    content: ""; position: absolute; left: 4px; top: -10px; bottom: 50%;
    border-left: 2px solid; border-bottom: 2px solid; border-radius: 0 0 0 6px;
    width: 8px;
  }
  .set-connector-wrap.drop::before  { border-color: rgba(233,69,96,0.6); }
  .set-connector-wrap.half::before  { border-color: rgba(255,149,0,0.6); }
  .set-connector-wrap.both::before  { border-color: rgba(175,82,222,0.6); }
  /* the vertical line continuing down from previous set */
  .set-connector-wrap.has-next-tagged::after {
    content: ""; position: absolute; left: 4px; bottom: -10px; top: 50%;
    border-left: 2px solid;
  }
  .set-connector-wrap.has-next-tagged.drop::after  { border-color: rgba(233,69,96,0.6); }
  .set-connector-wrap.has-next-tagged.half::after  { border-color: rgba(255,149,0,0.6); }
  .set-connector-wrap.has-next-tagged.both::after  { border-color: rgba(175,82,222,0.6); }
</style>

// ── UTILS ────────────────────────────────────────────────────────────────────
function todayStr() { return new Date().toISOString().split("T")[0]; }
function parseD(d) { return new Date(d.split(" ")[0] + "T12:00:00"); }
function fmtD(d) { return new Date(d + "T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric",year:"2-digit"}); }
function daysSince(d) { return Math.round((Date.now() - parseD(d)) / 86400000); }
function uid() { return "u_" + Math.random().toString(36).slice(2,9); }
function avgGap(sessions) {
  const dates = [...sessions].sort((a,b)=>parseD(a.date)-parseD(b.date)).map(s=>parseD(s.date));
  const gaps = [];
  for(let i=1;i<dates.length;i++){const g=Math.round((dates[i]-dates[i-1])/86400000);if(g>0&&g<150)gaps.push(g);}
  return gaps.length ? Math.round(gaps.reduce((a,b)=>a+b,0)/gaps.length) : null;
}
function el(tag, attrs={}, ...children) {
  const e = document.createElement(tag);
  for(const [k,v] of Object.entries(attrs)) {
    if(k==="style"&&typeof v==="object") Object.assign(e.style, v);
    else if(k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(), v);
    else e.setAttribute(k, v);
  }
  for(const c of children) {
    if(c==null||c===false) continue;
    e.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  }
  return e;
}
function svgEl(children) {
  const div = document.createElement("div");
  div.innerHTML = children;
  return div.firstChild;
}

let toastTimer = null;
function showToast(msg) {
  let t = document.getElementById("toast");
  if(!t) { t = el("div",{id:"toast",class:"toast"}); document.getElementById("app").appendChild(t); }
  t.textContent = msg;
  t.style.display = "block";
  if(toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>{ t.style.display="none"; }, 2500);
}

// ── RENDER ENGINE ──────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById("app");
  const existing = app.querySelectorAll(".screen, .tab-bar, .log-overlay");
  existing.forEach(e=>e.remove());

  if(STATE.logging) {
    app.appendChild(renderLogScreen(STATE.logging)); // now an array
  } else {
    app.appendChild(renderTabBar());
    if(STATE.tab === "home") app.appendChild(renderHome());
    else app.appendChild(renderMuscle(STATE.tab));
  }
}

// ── TAB BAR ──────────────────────────────────────────────────────────────────
function renderTabBar() {
  const bar = el("div",{class:"tab-bar"});
  const tabs = ["home",...MUSCLES];
  tabs.forEach(t => {
    const isHome = t === "home";
    const col = isHome ? null : COL[t];
    const active = STATE.tab === t;
    const ms = isHome ? [] : STATE.sessions.filter(s=>s.muscle===t);
    const last = ms.length ? [...ms].sort((a,b)=>parseD(b.date)-parseD(a.date))[0] : null;
    const ds = last ? daysSince(last.date) : null;
    const ag = avgGap(ms);
    const overdue = !isHome && ds!==null && ag && ds > ag*1.4;

    const iconColor = active ? (isHome?"#fff":col.a) : "#333";
    const labelColor = active ? (isHome?"#aaa":col.l) : "#333";

    const btn = el("button",{class:"tab-btn"+(active?" active":""), onClick:()=>{ STATE.tab=t; render(); }});
    if(overdue) btn.appendChild(el("span",{class:"tab-dot",style:{background:col.a}}));
    const iconWrap = document.createElement("div");
    iconWrap.innerHTML = SVGI[t] || SVGI.home;
    iconWrap.firstChild.style.color = iconColor;
    btn.appendChild(iconWrap.firstChild);
    btn.appendChild(el("span",{class:"tab-label",style:{color:labelColor}},isHome?"Home":t));
    bar.appendChild(btn);
  });
  return bar;
}

function renderHome() {
  const scr = el("div",{class:"screen"});
  const pad = el("div",{style:{padding:"20px 16px 0"}});

  // Title
  pad.appendChild(el("div",{style:{fontSize:"11px",color:"#444",letterSpacing:"0.15em",textTransform:"uppercase",marginBottom:"2px"}},"Training Log"));
  pad.appendChild(el("div",{style:{fontSize:"28px",fontWeight:"800",color:"#fff",letterSpacing:"-0.8px",marginBottom:"20px"}},"Lift Tracker"));

  // Stats
  const total = STATE.sessions.length;
  const uniqueDays = new Set(STATE.sessions.map(s=>s.date.split(" ")[0])).size;
  const sg = el("div",{class:"stat-grid"});
  [[total,"Sessions"],[uniqueDays,"Gym Days"],[MUSCLES.length,"Groups"]].forEach(([v,l])=>{
    const c = el("div",{class:"stat-card"});
    c.appendChild(el("div",{class:"stat-val"},String(v)));
    c.appendChild(el("div",{class:"stat-lbl"},l));
    sg.appendChild(c);
  });
  pad.appendChild(sg);

  // Muscle cards
  const mg = el("div",{class:"muscle-grid"});
  MUSCLES.forEach(m => {
    const col = COL[m];
    const ms = STATE.sessions.filter(s=>s.muscle===m).sort((a,b)=>parseD(b.date)-parseD(a.date));
    const last = ms[0];
    const ds = last ? daysSince(last.date) : null;
    const ag = avgGap(ms);
    const overdue = ds!==null && ag && ds>ag*1.4;

    const card = el("button",{class:"muscle-card",
      style:{background:overdue?col.dim:"rgba(255,255,255,0.04)",borderColor:overdue?col.a+"66":"rgba(255,255,255,0.08)"},
      onClick:()=>{ STATE.tab=m; render(); }
    });
    if(overdue) card.appendChild(el("span",{style:{position:"absolute",top:"10px",right:"12px",width:"7px",height:"7px",borderRadius:"50%",background:col.a,display:"block"}}));

    const row = el("div",{style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"8px"}});
    row.appendChild(el("span",{style:{fontSize:"18px",color:col.a}},ICON[m]));
    row.appendChild(el("span",{style:{fontSize:"13px",fontWeight:"700",color:"#fff"}},m));
    card.appendChild(row);
    card.appendChild(el("div",{style:{fontSize:"11px",color:"#666"}},ms.length+" sessions"));
    if(ds!==null) card.appendChild(el("div",{style:{fontSize:"11px",color:overdue?col.a:"#444",marginTop:"2px"}},ds+"d ago"+(ag?` · avg ${ag}d`:"")));
    else card.appendChild(el("div",{style:{fontSize:"11px",color:"#333"}},"No sessions yet"));
    mg.appendChild(card);
  });
  pad.appendChild(mg);

  // Partners
  const partners = {};
  STATE.sessions.forEach(s=>{if(s.partner)s.partner.split(",").forEach(p=>{const t=p.trim();partners[t]=(partners[t]||0)+1;});});
  const topP = Object.entries(partners).sort((a,b)=>b[1]-a[1]).slice(0,4);
  if(topP.length) {
    pad.appendChild(el("div",{class:"section-label",style:{marginBottom:"8px"}},"Training Partners"));
    const chips = el("div",{class:"partner-chips"});
    topP.forEach(([p,c])=> chips.appendChild(el("span",{class:"chip"},p+" ×"+c)));
    pad.appendChild(chips);
  }

  // Recent
  pad.appendChild(el("div",{class:"section-label",style:{marginBottom:"8px"}},"Recent"));
  const recent = [...STATE.sessions].sort((a,b)=>parseD(b.date)-parseD(a.date)).slice(0,8);
  recent.forEach(s=>{
    const col = COL[s.muscle];
    const row = el("div",{class:"recent-row",onClick:()=>{ STATE.tab=s.muscle; render(); }});
    row.appendChild(el("span",{style:{fontSize:"16px",color:col.a,width:"22px",textAlign:"center"}},ICON[s.muscle]));
    const info = el("div",{style:{flex:"1"}});
    info.appendChild(el("div",{style:{fontSize:"13px",color:col.l,fontWeight:"600"}},s.muscle));
    info.appendChild(el("div",{style:{fontSize:"11px",color:"#555"}},s.exercises.length+" exercise"+(s.exercises.length!==1?"s":"")+(s.partner?" · w/ "+s.partner:"")));
    row.appendChild(info);
    row.appendChild(el("div",{style:{fontSize:"11px",color:"#444",fontFamily:"monospace"}},fmtD(s.date)));
    pad.appendChild(row);
  });

  scr.appendChild(pad);
  return scr;
}

// ── MUSCLE SCREEN ─────────────────────────────────────────────────────────────
function renderMuscle(muscle) {
  const col = COL[muscle];
  const ms = STATE.sessions.filter(s=>s.muscle===muscle).sort((a,b)=>parseD(b.date)-parseD(a.date));
  const ag = avgGap(ms);
  const last = ms[0];
  const ds = last ? daysSince(last.date) : null;
  const overdue = ds!==null && ag && ds>ag*1.4;

  const scr = el("div",{class:"screen",style:{paddingBottom:"calc(env(safe-area-inset-bottom,0px) + 130px)"}});
  const pad = el("div",{style:{padding:"20px 16px 0"}});

  // Header
  const hrow = el("div",{style:{display:"flex",alignItems:"flex-start",gap:"10px",marginBottom:"4px"}});
  hrow.appendChild(el("span",{style:{fontSize:"24px",color:col.a,lineHeight:"1.2"}},ICON[muscle]));
  const htxt = el("div");
  htxt.appendChild(el("div",{style:{fontSize:"22px",fontWeight:"800",color:"#fff",letterSpacing:"-0.5px"}},muscle));
  const sub = el("div",{style:{fontSize:"11px",color:"#555"}});
  if(last) {
    sub.appendChild(document.createTextNode("Last: "));
    sub.appendChild(el("span",{style:{color:col.l}},fmtD(last.date)));
    sub.appendChild(document.createTextNode(" · "+ds+"d ago"));
    if(ag) { sub.appendChild(document.createTextNode(" · avg every ")); sub.appendChild(el("span",{style:{color:col.l}},ag+"d")); }
  } else sub.textContent = "No sessions yet";
  htxt.appendChild(sub);
  hrow.appendChild(htxt);
  pad.appendChild(hrow);

  // Overdue banner
  if(overdue) {
    const banner = el("div",{class:"overdue-banner",style:{background:col.a+"18",borderColor:col.a+"44",color:col.l}},
      "⚠ "+ds+"d since last — you usually train "+muscle.toLowerCase()+" every "+ag+"d.");
    pad.appendChild(banner);
  }

  // Frequency bars
  if(ms.length > 1) {
    const allDates = ms.map(s=>parseD(s.date));
    const minD = new Date(Math.min(...allDates));
    const n = Math.ceil((Date.now()-minD)/(7*86400000))+1;
    const weeks = Array.from({length:n},(_,i)=>{
      const ws=new Date(minD.getTime()+i*7*86400000),we=new Date(ws.getTime()+7*86400000);
      return ms.filter(s=>{const d=parseD(s.date);return d>=ws&&d<we;}).length;
    });
    const maxW = Math.max(...weeks,1);
    pad.appendChild(el("div",{class:"section-label",style:{marginTop:"16px",marginBottom:"0"}},"Weekly frequency"));
    const bars = el("div",{class:"freq-bar-wrap"});
    weeks.forEach(c=>{
      bars.appendChild(el("div",{class:"freq-bar",style:{height:c?Math.max(4,(c/maxW)*32)+"px":"3px",background:c?col.a:"rgba(255,255,255,0.06)"}}));
    });
    pad.appendChild(bars);
  }

  pad.appendChild(el("div",{class:"section-label",style:{marginTop:"20px",marginBottom:"10px"}},ms.length+" sessions"));

  // Sessions
  ms.forEach(s => pad.appendChild(renderSessionCard(s, col)));

  scr.appendChild(pad);

  // FAB
  const fab = el("div",{class:"muscle-fab"});
  const fabBtn = el("button",{class:"btn-primary",
    style:{background:col.a,boxShadow:"0 4px 24px "+col.a+"55"},
    onClick:()=>{ STATE.logging=[muscle]; render(); }
  },"+ Log "+muscle+" Session");
  fab.appendChild(fabBtn);
  scr.appendChild(fab);

  return scr;
}

// ── SESSION CARD ─────────────────────────────────────────────────────────────
function renderSessionCard(session, col) {
  const isNew = session.id.startsWith("u_");
  const isOpen = STATE.expandedSessions.has(session.id);
  const card = el("div",{class:"session-card"});

  const hdr = el("button",{class:"session-header",onClick:()=>{
    if(isOpen) STATE.expandedSessions.delete(session.id);
    else STATE.expandedSessions.add(session.id);
    render();
  }});

  const left = el("div",{style:{flex:"1"}});
  const titleRow = el("div",{style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"2px"}});
  titleRow.appendChild(el("span",{style:{fontSize:"13px",color:"#fff",fontWeight:"600",fontFamily:"monospace"}},fmtD(session.date)));
  if(isNew) titleRow.appendChild(el("span",{class:"chip",style:{color:col.a,background:col.a+"22"}},"NEW"));
  left.appendChild(titleRow);
  left.appendChild(el("div",{style:{fontSize:"11px",color:"#555"}},
    session.exercises.length+" exercise"+(session.exercises.length!==1?"s":"")+(session.partner?" · w/ "+session.partner:"")));
  hdr.appendChild(left);
  if(session.preworkout) hdr.appendChild(el("span",{class:"chip"},session.preworkout.split(" ")[0]));
  hdr.appendChild(el("span",{style:{color:isOpen?col.a:"#333",fontSize:"13px",transition:"transform 0.2s",transform:isOpen?"rotate(180deg)":"none",flexShrink:"0",marginLeft:"6px"}},"▼"));
  card.appendChild(hdr);

  if(isOpen) {
    const body = el("div",{class:"session-body"});
    if(session.notes) body.appendChild(el("div",{style:{fontSize:"11px",color:"#666",fontStyle:"italic",margin:"10px 0 8px"}},"📝 "+session.notes));
    session.exercises.forEach((ex,i)=>{
      const exDiv = el("div",{style:{marginBottom:"10px",paddingTop:i>0?"10px":"8px",borderTop:i>0?"1px solid rgba(255,255,255,0.05)":"none"}});
      exDiv.appendChild(el("div",{style:{fontSize:"12px",color:col.l,fontWeight:"700",marginBottom:"6px"}},ex.name));
      const setsRow = el("div",{style:{display:"flex",gap:"6px",flexWrap:"wrap"}});
      ex.sets.forEach(s=>{
        const TAG_LABEL = {drop:"DROP",half:"½ REP",both:"DROP+½"};
        const tag = s.tag && s.tag!=="none" ? TAG_LABEL[s.tag]||"" : "";
        const txt = s.w+" × "+s.r+(tag?" · "+tag:"");
        const tagCol = s.tag==="drop"?"#ff8fa3":s.tag==="half"?"#ffb84d":s.tag==="both"?"#cc88ef":"#bbb";
        const tagBg = s.tag==="drop"?"rgba(233,69,96,0.12)":s.tag==="half"?"rgba(255,149,0,0.12)":s.tag==="both"?"rgba(175,82,222,0.12)":"rgba(255,255,255,0.06)";
        setsRow.appendChild(el("span",{style:{fontSize:"12px",fontFamily:"monospace",color:tagCol,background:tagBg,borderRadius:"6px",padding:"4px 8px"}},txt));
      });
      exDiv.appendChild(setsRow);
      body.appendChild(exDiv);
    });
    if(isNew) {
      const delWrap = el("div",{style:{marginTop:"10px"}});
      const delBtn = el("button",{class:"btn-danger"},"Delete session");
      const confirmRow = el("div",{style:{display:"none",gap:"8px",marginTop:"8px"}});
      const confirmMsg = el("span",{style:{fontSize:"12px",color:"#aaa",flex:"1",alignSelf:"center"}},"Sure? This can't be undone.");
      const yesBtn = el("button",{style:{background:"rgba(231,76,60,0.2)",border:"1px solid rgba(231,76,60,0.5)",color:"#e74c3c",borderRadius:"8px",padding:"8px 14px",fontSize:"12px",fontWeight:"700",cursor:"pointer",fontFamily:"inherit"}},"Delete");
      const noBtn  = el("button",{style:{background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.1)",color:"#aaa",borderRadius:"8px",padding:"8px 14px",fontSize:"12px",fontWeight:"700",cursor:"pointer",fontFamily:"inherit"}},"Cancel");
      confirmRow.appendChild(confirmMsg);
      confirmRow.appendChild(yesBtn);
      confirmRow.appendChild(noBtn);
      delBtn.addEventListener("click",()=>{
        delBtn.style.display="none";
        confirmRow.style.display="flex";
      });
      noBtn.addEventListener("click",()=>{
        confirmRow.style.display="none";
        delBtn.style.display="";
      });
      yesBtn.addEventListener("click",()=>{
        STATE.sessions = STATE.sessions.filter(s=>s.id!==session.id);
        STATE.expandedSessions.delete(session.id);
        saveState();
        showToast("Session deleted");
        render();
      });
      delWrap.appendChild(delBtn);
      delWrap.appendChild(confirmRow);
      body.appendChild(delWrap);
    }
    card.appendChild(body);
  }
  return card;
}

// ── LOG SCREEN ────────────────────────────────────────────────────────────────
function renderLogScreen(muscles) {
  // muscles is an array e.g. ["Back"] or ["Back","Shoulders"]
  const primaryMuscle = muscles[0];
  const primaryCol = COL[primaryMuscle];

  // Shared meta
  let date = todayStr();
  let partner = "";
  let preworkout = "";
  let notes = "";

  // Per-muscle exercise lists
  const exData = {}; // muscle -> [{name, sets:[{w,r,tag}]}]
  muscles.forEach(m => {
    const last = STATE.sessions.filter(s=>s.muscle===m).sort((a,b)=>parseD(b.date)-parseD(a.date))[0];
    exData[m] = [{name:"",sets:[{w:"",r:"",tag:"none"}]}];
    // store last session reference for copy button
    exData[m]._last = last || null;
  });

  // Active muscle set (for toggling)
  let activeMuscles = [...muscles];

  const overlay = el("div",{class:"screen slide-up",style:{background:"#0d0d0f",zIndex:"60",paddingBottom:"0"}});

  // ── NAV ──
  const nav = el("div",{style:{display:"flex",alignItems:"center",gap:"12px",padding:"16px 16px 0",borderBottom:"1px solid rgba(255,255,255,0.07)",paddingBottom:"16px",paddingTop:"calc(env(safe-area-inset-top,20px) + 16px)"}});
  nav.appendChild(el("button",{style:{background:"rgba(255,255,255,0.07)",border:"none",color:"#aaa",borderRadius:"10px",padding:"8px 14px",fontSize:"14px",cursor:"pointer",fontWeight:"600",fontFamily:"inherit"},
    onClick:()=>{ STATE.logging=null; render(); }
  },"← Back"));
  nav.appendChild(el("span",{style:{flex:"1",textAlign:"center",fontSize:"16px",fontWeight:"700",color:"#fff"}},"Log Session"));
  nav.appendChild(el("div",{style:{width:"60px"}}));
  overlay.appendChild(nav);

  // ── MUSCLE PICKER ──
  const pickerWrap = el("div",{style:{padding:"14px 16px 0"}});
  pickerWrap.appendChild(el("div",{class:"form-label",style:{marginBottom:"8px"}},"Muscle Groups"));
  const pickerRow = el("div",{style:{display:"flex",gap:"8px",flexWrap:"wrap",marginBottom:"4px"}});

  function rebuildPicker() {
    pickerRow.innerHTML = "";
    MUSCLES.forEach(m => {
      const col = COL[m];
      const active = activeMuscles.includes(m);
      const btn = el("button",{
        style:{
          background: active ? col.a+"28" : "rgba(255,255,255,0.05)",
          border: `1.5px solid ${active ? col.a : "rgba(255,255,255,0.1)"}`,
          color: active ? col.l : "#555",
          borderRadius:"20px", padding:"7px 14px", fontSize:"13px",
          fontWeight:"700", cursor:"pointer", fontFamily:"inherit",
          display:"flex", alignItems:"center", gap:"6px",
        },
        onClick:()=>{
          if(active) {
            if(activeMuscles.length===1) return; // must keep at least one
            activeMuscles = activeMuscles.filter(x=>x!==m);
            if(!exData[m]) exData[m] = [{name:"",sets:[{w:"",r:"",tag:"none"}]}];
          } else {
            activeMuscles.push(m);
            if(!exData[m]) {
              const last = STATE.sessions.filter(s=>s.muscle===m).sort((a,b)=>parseD(b.date)-parseD(a.date))[0];
              exData[m] = [{name:"",sets:[{w:"",r:"",tag:"none"}]}];
              exData[m]._last = last||null;
            }
          }
          rebuildPicker();
          rebuildAllExercises();
        }
      });
      const iw = document.createElement("span");
      iw.innerHTML = SVGI[m];
      iw.firstChild.style.width="16px"; iw.firstChild.style.height="16px";
      iw.firstChild.style.color = active ? col.l : "#444";
      btn.appendChild(iw.firstChild);
      btn.appendChild(document.createTextNode(m));
      pickerRow.appendChild(btn);
    });
  }
  rebuildPicker();
  pickerWrap.appendChild(pickerRow);
  overlay.appendChild(pickerWrap);

  // ── SCROLLABLE FORM ──
  const form = el("div",{style:{overflowY:"auto",WebkitOverflowScrolling:"touch",padding:"16px 16px 0",paddingBottom:"100px"}});

  // Meta fields
  const g1 = el("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:"12px"}});
  const dateLabel = el("div"); dateLabel.appendChild(el("label",{class:"form-label"},"Date"));
  const dateI = el("input",{class:"form-input",type:"date",value:date,style:{colorScheme:"dark"}});
  dateI.addEventListener("change",e=>date=e.target.value);
  dateLabel.appendChild(dateI); g1.appendChild(dateLabel);
  const partLabel = el("div"); partLabel.appendChild(el("label",{class:"form-label"},"Partner"));
  const partI = el("input",{class:"form-input",placeholder:"e.g. Sarah"});
  partI.addEventListener("input",e=>partner=e.target.value);
  partLabel.appendChild(partI); g1.appendChild(partLabel);
  form.appendChild(g1);

  const g2 = el("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:"18px"}});
  const pwLabel = el("div"); pwLabel.appendChild(el("label",{class:"form-label"},"Pre-workout"));
  const pwI = el("input",{class:"form-input",placeholder:"White Monster…"});
  pwI.addEventListener("input",e=>preworkout=e.target.value);
  pwLabel.appendChild(pwI); g2.appendChild(pwLabel);
  const notesLabel = el("div"); notesLabel.appendChild(el("label",{class:"form-label"},"Notes"));
  const notesI = el("input",{class:"form-input",placeholder:"Felt strong…"});
  notesI.addEventListener("input",e=>notes=e.target.value);
  notesLabel.appendChild(notesI); g2.appendChild(notesLabel);
  form.appendChild(g2);

  // Per-muscle exercise sections
  const allExContainers = {}; // muscle -> div

  function buildExCard(m, ei) {
    const col = COL[m];
    const lib = LIBRARY[m]||[];
    const ex = exData[m][ei];
    const card = el("div",{class:"ex-card",style:{borderColor: col.a+"33"}});

    const selRow = el("div",{style:{display:"flex",gap:"8px",marginBottom:"12px",alignItems:"center"}});
    const sel = el("select",{class:"ex-select"+(ex.name?" has-value":"")});
    const defOpt = document.createElement("option"); defOpt.value=""; defOpt.textContent="— Select exercise —"; sel.appendChild(defOpt);
    lib.forEach(l=>{const o=document.createElement("option");o.value=l;o.textContent=l;if(l===ex.name)o.selected=true;sel.appendChild(o);});
    const custOpt = document.createElement("option"); custOpt.value="__custom"; custOpt.textContent="+ Custom…"; sel.appendChild(custOpt);
    sel.addEventListener("change",e=>{ exData[m][ei].name=e.target.value; sel.className="ex-select"+(e.target.value?" has-value":""); });
    selRow.appendChild(sel);
    if(exData[m].length>1) {
      const rm = el("button",{style:{background:"rgba(231,76,60,0.15)",border:"1px solid rgba(231,76,60,0.3)",color:"#e74c3c",borderRadius:"10px",padding:"10px 12px",fontSize:"16px",cursor:"pointer",flexShrink:"0"}},"✕");
      rm.addEventListener("click",()=>{ exData[m].splice(ei,1); rebuildMuscleSection(m); });
      selRow.appendChild(rm);
    }
    card.appendChild(selRow);

    if(ex.name==="__custom") {
      const ci = el("input",{class:"form-input",placeholder:"Exercise name",style:{marginBottom:"12px"},value:ex.customName||""});
      ci.addEventListener("input",e=>{ exData[m][ei].customName=e.target.value; });
      card.appendChild(ci);
    }

    // Sets
    const TAG_CYCLE = ["none","drop","half","both"];
    const TAG_LABEL = {none:"TAG",drop:"DROP",half:"½ REP",both:"DROP+½"};
    function rebuildSets() {
      setsContainer.innerHTML="";
      ex.sets.forEach((s,si)=>{
        if(!s.tag) s.tag="none";
        const isTagged = s.tag!=="none";
        const nextTagged = si<ex.sets.length-1 && ex.sets[si+1].tag && ex.sets[si+1].tag!=="none";
        const isLast = si===ex.sets.length-1;
        const setRow = el("div",{style:{display:"flex",gap:"6px",alignItems:"center"}});
        setRow.appendChild(el("span",{style:{fontSize:"11px",color:isTagged?"transparent":"#444",minWidth:"30px",textAlign:"right",flexShrink:"0"}},"S"+(si+1)));
        const wi = el("input",{class:"set-input",placeholder:"Wt",inputmode:"decimal",value:s.w,style:{flex:"1.2"}});
        wi.addEventListener("input",e=>{ ex.sets[si].w=e.target.value; });
        wi.addEventListener("focus",e=>{ setTimeout(()=>e.target.scrollIntoView({behavior:"smooth",block:"center"}),320); });
        setRow.appendChild(wi);
        setRow.appendChild(el("span",{style:{color:"#333",fontSize:"14px",flexShrink:"0"}},"×"));
        const ri = el("input",{class:"set-input",placeholder:"Reps",inputmode:"decimal",value:s.r,style:{flex:"1"}});
        ri.addEventListener("input",e=>{ ex.sets[si].r=e.target.value; });
        ri.addEventListener("focus",e=>{ setTimeout(()=>e.target.scrollIntoView({behavior:"smooth",block:"center"}),320); });
        setRow.appendChild(ri);
        const tagBtn = el("button",{class:"set-tag "+s.tag},TAG_LABEL[s.tag]);
        tagBtn.addEventListener("click",()=>{ const next=TAG_CYCLE[(TAG_CYCLE.indexOf(s.tag)+1)%TAG_CYCLE.length]; ex.sets[si].tag=next; rebuildSets(); });
        setRow.appendChild(tagBtn);
        const cpBtn = el("button",{class:"btn-copy-down",title:isLast?"Copy & add set":"Copy to next set"},isLast?"＋":"⬇");
        if(isLast){ cpBtn.style.borderColor="rgba(255,255,255,0.2)"; cpBtn.style.color="#aaa"; cpBtn.style.fontSize="18px"; }
        cpBtn.addEventListener("click",()=>{
          if(isLast) ex.sets.push({w:ex.sets[si].w,r:"",tag:"none"});
          else { ex.sets[si+1].w=ex.sets[si].w; ex.sets[si+1].r=ex.sets[si].r; }
          rebuildSets();
        });
        setRow.appendChild(cpBtn);
        if(ex.sets.length>1){
          const ds=el("button",{style:{background:"none",border:"none",color:"#383838",fontSize:"18px",cursor:"pointer",padding:"0",flexShrink:"0",minWidth:"24px",minHeight:"42px"}},"✕");
          ds.addEventListener("click",()=>{ ex.sets.splice(si,1); rebuildSets(); });
          setRow.appendChild(ds);
        } else {
          setRow.appendChild(el("div",{style:{width:"24px",flexShrink:"0"}}));
        }
        if(isTagged){
          let cls="set-connector-wrap "+s.tag+(nextTagged?" has-next-tagged":"");
          const wrap=el("div",{class:cls}); wrap.appendChild(setRow); setsContainer.appendChild(wrap);
        } else { setRow.style.marginBottom="8px"; setsContainer.appendChild(setRow); }
      });
    }
    const setsContainer = el("div");
    rebuildSets();
    card.appendChild(setsContainer);
    const addSetBtn = el("button",{class:"btn-add-set"},"+ Add set");
    addSetBtn.addEventListener("click",()=>{ ex.sets.push({w:"",r:"",tag:"none"}); rebuildSets(); });
    card.appendChild(addSetBtn);
    return card;
  }

  function rebuildMuscleSection(m) {
    const cont = allExContainers[m];
    if(!cont) return;
    cont.innerHTML="";
    exData[m].forEach((_,ei)=>cont.appendChild(buildExCard(m,ei)));
  }

  function rebuildAllExercises() {
    muscleExWrap.innerHTML="";
    activeMuscles.forEach(m=>{
      const col=COL[m];
      const last=exData[m]?._last;

      // Section header
      const hdr = el("div",{style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"10px",marginTop:"6px"}});
      const iw=document.createElement("span"); iw.innerHTML=SVGI[m];
      iw.firstChild.style.width="16px"; iw.firstChild.style.height="16px"; iw.firstChild.style.color=col.a;
      hdr.appendChild(iw.firstChild);
      const mLabel = el("span",{style:{fontSize:"13px",fontWeight:"700",color:col.l}},m);
      hdr.appendChild(mLabel);
      // divider line
      const line=el("div",{style:{flex:"1",height:"1px",background:col.a+"33",marginLeft:"4px"}});
      hdr.appendChild(line);
      muscleExWrap.appendChild(hdr);

      // Copy last button
      if(last) {
        const cb=el("button",{class:"btn-ghost",style:{marginBottom:"10px",borderColor:col.a+"44",color:col.a+"cc"}},
          "↺ Copy from "+fmtD(last.date));
        cb.addEventListener("click",()=>{
          exData[m] = last.exercises.map(ex=>({name:ex.name,sets:ex.sets.map(s=>({w:s.w,r:"",tag:"none"}))}));
          exData[m]._last = last;
          rebuildMuscleSection(m);
        });
        muscleExWrap.appendChild(cb);
      }

      // Exercise container
      const cont = el("div");
      allExContainers[m] = cont;
      muscleExWrap.appendChild(cont);
      rebuildMuscleSection(m);

      // Add exercise button
      const addBtn=el("button",{class:"btn-add-ex",style:{color:col.a,borderColor:col.a+"55",marginBottom:"20px"}},
        "+ Add "+m+" exercise");
      addBtn.addEventListener("click",()=>{
        exData[m].push({name:"",sets:[{w:"",r:"",tag:"none"}]});
        rebuildMuscleSection(m);
      });
      muscleExWrap.appendChild(addBtn);
    });
  }

  const muscleExWrap = el("div");
  form.appendChild(muscleExWrap);
  rebuildAllExercises();

  overlay.appendChild(form);

  // ── FOOTER SAVE ──
  const footer = el("div",{class:"log-footer"});
  const saveBtn = el("button",{class:"btn-primary",
    style:{background:primaryCol.a,boxShadow:"0 4px 20px "+primaryCol.a+"55"}},
    "Save Session"+(activeMuscles.length>1?"s":""));
  saveBtn.addEventListener("click",()=>{
    // Build one session per active muscle
    const newSessions = [];
    for(const m of activeMuscles) {
      const clean = (exData[m]||[]).filter(ex=>{
        const name=ex.name==="__custom"?(ex.customName||""):ex.name;
        return name && ex.sets.some(s=>s.w||s.r);
      }).map(ex=>({
        name:ex.name==="__custom"?(ex.customName||"Custom"):ex.name,
        sets:ex.sets.filter(s=>s.w||s.r)
      }));
      if(!clean.length) continue;
      newSessions.push({
        id:uid(), muscle:m,
        date:dateI.value||date,
        partner:partI.value||null,
        preworkout:pwI.value||null,
        notes:notesI.value||null,
        exercises:clean
      });
    }
    if(!newSessions.length){ alert("Add at least one exercise with sets."); return; }
    newSessions.forEach(s=>STATE.sessions.unshift(s));
    saveState();
    STATE.logging=null;
    showToast(newSessions.length>1
      ? newSessions.map(s=>s.muscle).join(" + ")+" saved ✓"
      : newSessions[0].muscle+" saved ✓");
    render();
  });
  footer.appendChild(saveBtn);
  overlay.appendChild(footer);

  return overlay;
}

// ── BOOT ─────────────────────────────────────────────────────────────────────
// Scroll focused input above keyboard on iOS
if(window.visualViewport) {
  window.visualViewport.addEventListener("resize", ()=>{
    const focused = document.activeElement;
    if(focused && (focused.tagName==="INPUT"||focused.tagName==="TEXTAREA")) {
      setTimeout(()=>focused.scrollIntoView({behavior:"smooth",block:"center"}), 50);
    }
  });
}
render();
</script>
</body>
